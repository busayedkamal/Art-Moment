<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrintFlow - نظام إدارة طباعة الصور</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide-react@0.263.1/dist/umd/lucide-react.min.js"></script>
    <script src="https://unpkg.com/date-fns@2.29.3/dist/date-fns.js"></script>
    <script src="https://unpkg.com/react-router-dom@6.8.0/dist/umd/react-router-dom.development.js"></script>
    <style>
        /* إضافة Tailwind CSS */
        @import url('https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css');
        
        /* تخصيصات للغة العربية */
        :root {
            --primary: #3b82f6;
            --secondary: #1d4ed8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }
        
        * {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #f9fafb;
            direction: rtl;
        }
        
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .status-pending { background-color: #fef3c7; color: #92400e; }
        .status-printing { background-color: #dbeafe; color: #1e40af; }
        .status-ready { background-color: #d1fae5; color: #065f46; }
        .status-delivered { background-color: #e5e7eb; color: #374151; }
        .status-cancelled { background-color: #fee2e2; color: #991b1b; }
        
        .source-badge {
            padding: 0.25rem 0.5rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .source-email { background-color: #e0e7ff; color: #3730a3; }
        .source-whatsapp { background-color: #dcfce7; color: #166534; }
        .source-telegram { background-color: #dbeafe; color: #1e40af; }
        .source-other { background-color: #f3e8ff; color: #6b21a8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // سيتم وضع كود React هنا
        const { useState, useEffect, createContext, useContext } = React;
        const { BrowserRouter, Routes, Route, Link, useLocation } = ReactRouterDOM;
        const { Printer, Home, Users, CreditCard, FolderOpen, Plus, Search, Filter, MoreVertical, Edit, Trash2, Eye, Calendar, Mail, MessageCircle, Smartphone, Download, Upload } = LucideReact;
        
        // أنواع البيانات
        const OrderStatus = {
            PENDING: 'pending',
            PRINTING: 'printing',
            READY: 'ready',
            DELIVERED: 'delivered',
            CANCELLED: 'cancelled'
        };
        
        const OrderSource = {
            EMAIL: 'email',
            WHATSAPP: 'whatsapp',
            TELEGRAM: 'telegram',
            OTHER: 'other'
        };
        
        const PaymentMethod = {
            CASH: 'cash',
            BANK_TRANSFER: 'bank_transfer',
            ONLINE: 'online'
        };
        
        // بيانات تجريبية
        const mockData = {
            customers: [
                {
                    id: '1',
                    name: 'أحمد محمد',
                    phone: '0551234567',
                    email: 'ahmed@example.com',
                    createdAt: new Date('2023-10-01'),
                    notes: 'زبون دائم'
                },
                {
                    id: '2',
                    name: 'فاطمة عبدالله',
                    phone: '0509876543',
                    email: 'fatima@example.com',
                    createdAt: new Date('2023-10-05'),
                    notes: 'تطلب جودة ممتازة'
                },
                {
                    id: '3',
                    name: 'خالد سعيد',
                    phone: '0541112233',
                    email: 'khaled@example.com',
                    createdAt: new Date('2023-10-10'),
                    notes: ''
                }
            ],
            orders: [
                {
                    id: '1001',
                    customerId: '1',
                    orderDate: new Date('2023-10-15'),
                    source: OrderSource.WHATSAPP,
                    totalPhotos: 25,
                    printedPhotos: 25,
                    status: OrderStatus.READY,
                    totalAmount: 150,
                    amountPaid: 100,
                    deliveryDate: new Date('2023-10-20'),
                    notes: 'طلب عادي'
                },
                {
                    id: '1002',
                    customerId: '2',
                    orderDate: new Date('2023-10-16'),
                    source: OrderSource.EMAIL,
                    totalPhotos: 15,
                    printedPhotos: 8,
                    status: OrderStatus.PRINTING,
                    totalAmount: 90,
                    amountPaid: 50,
                    notes: 'يوجد صور إضافية قريباً'
                },
                {
                    id: '1003',
                    customerId: '3',
                    orderDate: new Date('2023-10-17'),
                    source: OrderSource.TELEGRAM,
                    totalPhotos: 30,
                    printedPhotos: 0,
                    status: OrderStatus.PENDING,
                    totalAmount: 180,
                    amountPaid: 0,
                    notes: 'ينتظر الدفع'
                }
            ],
            payments: [
                {
                    id: '1',
                    orderId: '1001',
                    paymentDate: new Date('2023-10-15'),
                    amount: 100,
                    paymentMethod: PaymentMethod.BANK_TRANSFER,
                    notes: 'عربون'
                },
                {
                    id: '2',
                    orderId: '1002',
                    paymentDate: new Date('2023-10-16'),
                    amount: 50,
                    paymentMethod: PaymentMethod.CASH,
                    notes: 'دفعة أولى'
                }
            ]
        };
        
        // Context لإدارة الحالة
        const OrdersContext = createContext();
        
        const OrdersProvider = ({ children }) => {
            const [customers, setCustomers] = useState(mockData.customers);
            const [orders, setOrders] = useState(mockData.orders);
            const [payments, setPayments] = useState(mockData.payments);
            
            const addOrder = (orderData) => {
                const newOrder = {
                    ...orderData,
                    id: `100${orders.length + 1}`,
                };
                setOrders(prev => [...prev, newOrder]);
                return newOrder;
            };
            
            const updateOrderStatus = (orderId, status) => {
                setOrders(prev => prev.map(order => 
                    order.id === orderId ? { ...order, status } : order
                ));
            };
            
            const addPayment = (paymentData) => {
                const newPayment = {
                    ...paymentData,
                    id: `${payments.length + 1}`,
                };
                setPayments(prev => [...prev, newPayment]);
                
                // تحديث المبلغ المدفوع في الطلب
                setOrders(prev => prev.map(order => 
                    order.id === paymentData.orderId 
                        ? { ...order, amountPaid: (order.amountPaid || 0) + paymentData.amount }
                        : order
                ));
                
                return newPayment;
            };
            
            const addCustomer = (customerData) => {
                const newCustomer = {
                    ...customerData,
                    id: `${customers.length + 1}`,
                    createdAt: new Date()
                };
                setCustomers(prev => [...prev, newCustomer]);
                return newCustomer;
            };
            
            const getCustomerById = (id) => {
                return customers.find(customer => customer.id === id);
            };
            
            const getOrdersByCustomerId = (customerId) => {
                return orders.filter(order => order.customerId === customerId);
            };
            
            const getPaymentsByOrderId = (orderId) => {
                return payments.filter(payment => payment.orderId === orderId);
            };
            
            const value = {
                customers,
                orders,
                payments,
                addOrder,
                updateOrderStatus,
                addPayment,
                addCustomer,
                getCustomerById,
                getOrdersByCustomerId,
                getPaymentsByOrderId
            };
            
            return (
                <OrdersContext.Provider value={value}>
                    {children}
                </OrdersContext.Provider>
            );
        };
        
        const useOrders = () => {
            const context = useContext(OrdersContext);
            if (!context) {
                throw new Error('useOrders must be used within an OrdersProvider');
            }
            return context;
        };
        
        // المكونات المشتركة
        const Layout = ({ children }) => {
            const location = useLocation();
            
            const navigation = [
                { name: 'لوحة التحكم', href: '/', icon: Home },
                { name: 'الطلبات', href: '/orders', icon: FolderOpen },
                { name: 'العملاء', href: '/customers', icon: Users },
                { name: 'المدفوعات', href: '/payments', icon: CreditCard },
            ];
            
            return (
                <div className="min-h-screen bg-gray-50">
                    {/* الهيدر */}
                    <header className="bg-white shadow-sm border-b">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center h-16">
                                <div className="flex items-center">
                                    <Printer className="h-8 w-8 text-blue-600" />
                                    <span className="mr-2 text-xl font-bold text-gray-900">PrintFlow</span>
                                </div>
                                <nav className="flex space-x-8">
                                    {navigation.map((item) => {
                                        const Icon = item.icon;
                                        const isActive = location.pathname === item.href;
                                        return (
                                            <Link
                                                key={item.name}
                                                to={item.href}
                                                className={`inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium ${
                                                    isActive
                                                        ? 'border-blue-500 text-gray-900'
                                                        : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'
                                                }`}
                                            >
                                                <Icon className="h-4 w-4 ml-2" />
                                                {item.name}
                                            </Link>
                                        );
                                    })}
                                </nav>
                            </div>
                        </div>
                    </header>
                    
                    {/* المحتوى الرئيسي */}
                    <main className="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
                        {children}
                    </main>
                </div>
            );
        };
        
        const StatusBadge = ({ status }) => {
            const statusText = {
                [OrderStatus.PENDING]: 'معلق',
                [OrderStatus.PRINTING]: 'قيد الطباعة',
                [OrderStatus.READY]: 'جاهز للتسليم',
                [OrderStatus.DELIVERED]: 'تم التسليم',
                [OrderStatus.CANCELLED]: 'ملغى'
            };
            
            const statusClass = {
                [OrderStatus.PENDING]: 'status-pending',
                [OrderStatus.PRINTING]: 'status-printing',
                [OrderStatus.READY]: 'status-ready',
                [OrderStatus.DELIVERED]: 'status-delivered',
                [OrderStatus.CANCELLED]: 'status-cancelled'
            };
            
            return (
                <span className={`status-badge ${statusClass[status]}`}>
                    {statusText[status]}
                </span>
            );
        };
        
        const SourceBadge = ({ source }) => {
            const sourceText = {
                [OrderSource.EMAIL]: 'البريد الإلكتروني',
                [OrderSource.WHATSAPP]: 'واتساب',
                [OrderSource.TELEGRAM]: 'تيليغرام',
                [OrderSource.OTHER]: 'أخرى'
            };
            
            const sourceClass = {
                [OrderSource.EMAIL]: 'source-email',
                [OrderSource.WHATSAPP]: 'source-whatsapp',
                [OrderSource.TELEGRAM]: 'source-telegram',
                [OrderSource.OTHER]: 'source-other'
            };
            
            return (
                <span className={`source-badge ${sourceClass[source]}`}>
                    {sourceText[source]}
                </span>
            );
        };
        
        // مكونات لوحة التحكم
        const StatsGrid = () => {
            const { orders, payments, customers } = useOrders();
            
            const stats = [
                {
                    title: 'إجمالي الطلبات',
                    value: orders.length,
                    icon: FolderOpen,
                    color: 'blue',
                    change: '+12.5%',
                    changeType: 'increase'
                },
                {
                    title: 'قيد المعالجة',
                    value: orders.filter(o => o.status === OrderStatus.PENDING || o.status === OrderStatus.PRINTING).length,
                    icon: Printer,
                    color: 'orange',
                    change: '+8.2%',
                    changeType: 'increase'
                },
                {
                    title: 'العملاء النشطين',
                    value: customers.length,
                    icon: Users,
                    color: 'green',
                    change: '+3 جديد هذا الأسبوع',
                    changeType: 'increase'
                },
                {
                    title: 'إجمالي الإيرادات',
                    value: `$${payments.reduce((total, payment) => total + payment.amount, 0)}`,
                    icon: CreditCard,
                    color: 'emerald',
                    change: '23.5%',
                    changeType: 'increase'
                }
            ];
            
            const colorClasses = {
                blue: 'bg-blue-50 text-blue-600',
                orange: 'bg-orange-50 text-orange-600',
                green: 'bg-green-50 text-green-600',
                emerald: 'bg-emerald-50 text-emerald-600',
            };
            
            return (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                    {stats.map((stat) => {
                        const Icon = stat.icon;
                        return (
                            <div key={stat.title} className="bg-white rounded-lg shadow-sm border p-6">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-sm font-medium text-gray-600">{stat.title}</p>
                                        <p className="text-2xl font-bold text-gray-900 mt-1">{stat.value}</p>
                                        <p className={`text-xs mt-1 ${
                                            stat.changeType === 'increase' ? 'text-green-600' : 'text-red-600'
                                        }`}>
                                            {stat.change}
                                        </p>
                                    </div>
                                    <div className={`p-3 rounded-full ${colorClasses[stat.color]}`}>
                                        <Icon className="h-6 w-6" />
                                    </div>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        };
        
        const RecentOrders = () => {
            const { orders, getCustomerById } = useOrders();
            const recentOrders = orders.slice(0, 5);
            
            return (
                <div className="bg-white shadow-sm rounded-lg border">
                    <div className="px-6 py-4 border-b flex justify-between items-center">
                        <h2 className="text-lg font-semibold text-gray-900">أحدث الطلبات</h2>
                        <Link to="/orders" className="text-blue-600 hover:text-blue-800 text-sm font-medium">
                            عرض الكل
                        </Link>
                    </div>
                    <div className="overflow-x-auto">
                        <table className="min-w-full divide-y divide-gray-200">
                            <thead className="bg-gray-50">
                                <tr>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        رقم الطلب
                                    </th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        العميل
                                    </th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        التاريخ
                                    </th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        عدد الصور
                                    </th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        الحالة
                                    </th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        المبلغ
                                    </th>
                                </tr>
                            </thead>
                            <tbody className="bg-white divide-y divide-gray-200">
                                {recentOrders.map((order) => {
                                    const customer = getCustomerById(order.customerId);
                                    return (
                                        <tr key={order.id} className="hover:bg-gray-50">
                                            <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
                                                #{order.id}
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                                                {customer?.name}
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                                {dateFns.format(order.orderDate, 'dd/MM/yyyy')}
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                                {order.totalPhotos}
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap">
                                                <StatusBadge status={order.status} />
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                                                ${order.totalAmount}
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };
        
        // الصفحات
        const Dashboard = () => {
            return (
                <div>
                    <h1 className="text-2xl font-bold text-gray-900 mb-6">لوحة التحكم</h1>
                    <p className="text-gray-600 mb-8">مرحباً بعودتك! هذه نظرة عامة على أعمالك.</p>
                    
                    <StatsGrid />
                    <RecentOrders />
                </div>
            );
        };
        
        const OrdersPage = () => {
            const { orders, getCustomerById } = useOrders();
            const [showAddModal, setShowAddModal] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [statusFilter, setStatusFilter] = useState('');
            
            const filteredOrders = orders.filter(order => {
                const customer = getCustomerById(order.customerId);
                const matchesSearch = customer?.name?.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                    order.id.toLowerCase().includes(searchTerm.toLowerCase());
                const matchesStatus = statusFilter ? order.status === statusFilter : true;
                
                return matchesSearch && matchesStatus;
            });
            
            return (
                <div>
                    <div className="flex justify-between items-center mb-6">
                        <h1 className="text-2xl font-bold text-gray-900">إدارة الطلبات</h1>
                        <button 
                            onClick={() => setShowAddModal(true)}
                            className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center"
                        >
                            <Plus className="h-4 w-4 ml-1" />
                            إضافة طلب جديد
                        </button>
                    </div>
                    
                    <div className="bg-white p-4 rounded-lg shadow-sm border mb-6">
                        <div className="flex flex-wrap gap-4">
                            <div className="flex-1 min-w-[200px]">
                                <div className="relative">
                                    <Search className="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 h-4 w-4" />
                                    <input
                                        type="text"
                                        placeholder="ابحث بالعميل أو رقم الطلب..."
                                        className="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                </div>
                            </div>
                            <div className="min-w-[150px]">
                                <select
                                    className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                    value={statusFilter}
                                    onChange={(e) => setStatusFilter(e.target.value)}
                                >
                                    <option value="">جميع الحالات</option>
                                    <option value={OrderStatus.PENDING}>معلق</option>
                                    <option value={OrderStatus.PRINTING}>قيد الطباعة</option>
                                    <option value={OrderStatus.READY}>جاهز للتسليم</option>
                                    <option value={OrderStatus.DELIVERED}>تم التسليم</option>
                                    <option value={OrderStatus.CANCELLED}>ملغى</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div className="bg-white shadow-sm rounded-lg border overflow-hidden">
                        <table className="min-w-full divide-y divide-gray-200">
                            <thead className="bg-gray-50">
                                <tr>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        رقم الطلب
                                    </th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        العميل
                                    </th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        المصدر
                                    </th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        التاريخ
                                    </th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        الصور
                                    </th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        الحالة
                                    </th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        المبلغ الإجمالي
                                    </th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        المدفوع
                                    </th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        الإجراءات
                                    </th>
                                </tr>
                            </thead>
                            <tbody className="bg-white divide-y divide-gray-200">
                                {filteredOrders.map((order) => {
                                    const customer = getCustomerById(order.customerId);
                                    return (
                                        <tr key={order.id} className="hover:bg-gray-50">
                                            <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
                                                #{order.id}
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                                                {customer?.name}
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap">
                                                <SourceBadge source={order.source} />
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                                {dateFns.format(order.orderDate, 'dd/MM/yyyy')}
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                                {order.totalPhotos}
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap">
                                                <StatusBadge status={order.status} />
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                                                ${order.totalAmount}
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                                                ${order.amountPaid || 0}
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm font-medium">
                                                <div className="flex space-x-2 space-x-reverse">
                                                    <button className="text-blue-600 hover:text-blue-900">
                                                        <Eye className="h-4 w-4" />
                                                    </button>
                                                    <button className="text-green-600 hover:text-green-900">
                                                        <Edit className="h-4 w-4" />
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                    
                    {/* نموذج إضافة طلب - سيتم تطويره لاحقاً */}
                    {showAddModal && (
                        <AddOrderModal onClose={() => setShowAddModal(false)} />
                    )}
                </div>
            );
        };
        
        const AddOrderModal = ({ onClose }) => {
            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-lg w-full max-w-md">
                        <div className="p-6 border-b">
                            <h2 className="text-xl font-bold text-gray-900">إضافة طلب جديد</h2>
                        </div>
                        <div className="p-6">
                            <p className="text-gray-600 mb-4">سيتم تطوير هذا النموذج لاحقاً...</p>
                            <div className="flex justify-end space-x-3 space-x-reverse">
                                <button
                                    onClick={onClose}
                                    className="px-4 py-2 text-gray-700 border border-gray-300 rounded-lg hover:bg-gray-50"
                                >
                                    إلغاء
                                </button>
                                <button
                                    className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
                                >
                                    حفظ
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };
        
        const CustomersPage = () => {
            const { customers } = useOrders();
            
            return (
                <div>
                    <div className="flex justify-between items-center mb-6">
                        <h1 className="text-2xl font-bold text-gray-900">إدارة العملاء</h1>
                        <button className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center">
                            <Plus className="h-4 w-4 ml-1" />
                            إضافة عميل جديد
                        </button>
                    </div>
                    
                    <div className="bg-white shadow-sm rounded-lg border overflow-hidden">
                        <table className="min-w-full divide-y divide-gray-200">
                            <thead className="bg-gray-50">
                                <tr>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        الاسم
                                    </th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        الهاتف
                                    </th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        البريد الإلكتروني
                                    </th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        تاريخ التسجيل
                                    </th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        عدد الطلبات
                                    </th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        الإجراءات
                                    </th>
                                </tr>
                            </thead>
                            <tbody className="bg-white divide-y divide-gray-200">
                                {customers.map((customer) => (
                                    <tr key={customer.id} className="hover:bg-gray-50">
                                        <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
                                            {customer.name}
                                        </td>
                                        <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                            {customer.phone}
                                        </td>
                                        <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                            {customer.email}
                                        </td>
                                        <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                            {dateFns.format(customer.createdAt, 'dd/MM/yyyy')}
                                        </td>
                                        <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                            2
                                        </td>
                                        <td className="px-6 py-4 whitespace-nowrap text-sm font-medium">
                                            <div className="flex space-x-2 space-x-reverse">
                                                <button className="text-blue-600 hover:text-blue-900">
                                                    <Eye className="h-4 w-4" />
                                                </button>
                                                <button className="text-green-600 hover:text-green-900">
                                                    <Edit className="h-4 w-4" />
                                                </button>
                                            </div>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };
        
        const PaymentsPage = () => {
            const { payments, getCustomerById, orders } = useOrders();
            
            const getOrderById = (orderId) => {
                return orders.find(order => order.id === orderId);
            };
            
            return (
                <div>
                    <h1 className="text-2xl font-bold text-gray-900 mb-6">إدارة المدفوعات</h1>
                    
                    <div className="bg-white shadow-sm rounded-lg border overflow-hidden">
                        <table className="min-w-full divide-y divide-gray-200">
                            <thead className="bg-gray-50">
                                <tr>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        رقم العملية
                                    </th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        رقم الطلب
                                    </th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        العميل
                                    </th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        تاريخ الدفع
                                    </th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        المبلغ
                                    </th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        طريقة الدفع
                                    </th>
                                    <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        ملاحظات
                                    </th>
                                </tr>
                            </thead>
                            <tbody className="bg-white divide-y divide-gray-200">
                                {payments.map((payment) => {
                                    const order = getOrderById(payment.orderId);
                                    const customer = order ? getCustomerById(order.customerId) : null;
                                    
                                    return (
                                        <tr key={payment.id} className="hover:bg-gray-50">
                                            <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
                                                #{payment.id}
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                                                #{payment.orderId}
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                                {customer?.name}
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                                {dateFns.format(payment.paymentDate, 'dd/MM/yyyy')}
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                                                ${payment.amount}
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                                {payment.paymentMethod === 'cash' ? 'نقدي' : 
                                                 payment.paymentMethod === 'bank_transfer' ? 'تحويل بنكي' : 'إلكتروني'}
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                                {payment.notes}
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };
        
        // التطبيق الرئيسي
        const App = () => {
            return (
                <OrdersProvider>
                    <BrowserRouter>
                        <Layout>
                            <Routes>
                                <Route path="/" element={<Dashboard />} />
                                <Route path="/orders" element={<OrdersPage />} />
                                <Route path="/customers" element={<CustomersPage />} />
                                <Route path="/payments" element={<PaymentsPage />} />
                            </Routes>
                        </Layout>
                    </BrowserRouter>
                </OrdersProvider>
            );
        };
        
        // عرض التطبيق
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
